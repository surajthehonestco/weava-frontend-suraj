<div class="login-container forget-password-container">
  <div class="login-header-section">
    <img
      src="https://www.weavatools.com/app/assets/images/full-logo-black.png"
      class="login-image"
      alt="Weava"
    />
    <div class="login-text">Reset your password</div>
  </div>

  <div class="login-body-section forget-password-body">
    <form class="forget-password-form" (ngSubmit)="onSubmit()" novalidate>
      <div class="login-input-wrapper">
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="Email"
          class="login-text-input forget-password-input"
          required
        />
      </div>

      <div class="login-input-wrapper" *ngIf="isSuccess">
        <div class="forget-password-success">
          Password reset instruction is sent to your email. Please check your inbox.
        </div>
      </div>

      <div class="login-input-wrapper">
        <button
          type="submit"
          class="btn forget-password-submit text-white"
          [class.active]="isEmailValid && !isSubmitting"
          [disabled]="!isEmailValid || isSubmitting"
        >
          {{ isSubmitting ? 'Please wait...' : 'Reset Password' }}
        </button>
      </div>

      <div class="login-input-wrapper">
        <button type="button" class="btn forget-password-cancel" (click)="goToLogin()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
